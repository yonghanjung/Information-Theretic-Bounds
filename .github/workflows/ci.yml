name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q -m "not slow"

      - name: Build wheel/sdist
        run: python -m build

      - name: Wheel smoke
        run: |
          python -m pip install dist/*.whl
          itbound --help

      - name: CLI smoke (example -> quick)
        run: |
          mkdir -p /tmp/itbound-ci
          itbound example --out /tmp/itbound-ci/example.csv
          python - <<'PY'
          import numpy as np
          import pandas as pd

          rng = np.random.default_rng(0)
          n = 80
          x1 = rng.normal(size=n)
          x2 = rng.normal(size=n)
          a = (x1 + rng.normal(scale=0.3, size=n) > 0).astype(int)
          y = 0.3 + 0.7 * a + 0.2 * x1 - 0.1 * x2 + rng.normal(scale=0.1, size=n)
          pd.DataFrame({"y": y, "a": a, "x1": x1, "x2": x2}).to_csv("/tmp/itbound-ci/quick_input.csv", index=False)
          PY
          itbound quick \
            --data /tmp/itbound-ci/quick_input.csv \
            --treatment a \
            --outcome y \
            --covariates x1,x2 \
            --outdir /tmp/itbound-ci/out
          test -f /tmp/itbound-ci/out/results.json

  space-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and Space dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .[dev]
          python -m pip install -r scripts/demo/hf_space_requirements.txt

      - name: Run HF Space contract tests
        run: python -m pytest -q tests/test_hf_space_contract.py
