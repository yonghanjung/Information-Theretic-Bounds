name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    needs: build-dist
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  install-smoke-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install from TestPyPI and run smoke
        run: |
          set -euo pipefail
          python -m pip install -U pip
          VERSION="${GITHUB_REF_NAME#v}"
          INSTALLED=0
          for i in 1 2 3 4 5; do
            python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              "itbound==${VERSION}" && INSTALLED=1 && break
            echo "Waiting for TestPyPI propagation... attempt ${i}/5"
            sleep 20
          done
          if [ "${INSTALLED}" -ne 1 ]; then
            echo "Failed to install itbound==${VERSION} from TestPyPI after retries."
            exit 1
          fi
          itbound --help
          mkdir -p /tmp/itbound-testpypi
          itbound example --out /tmp/itbound-testpypi/example.csv
          python - <<'PY'
          import numpy as np
          import pandas as pd

          rng = np.random.default_rng(0)
          n = 80
          x1 = rng.normal(size=n)
          x2 = rng.normal(size=n)
          a = (x1 + rng.normal(scale=0.3, size=n) > 0).astype(int)
          y = 0.3 + 0.7 * a + 0.2 * x1 - 0.1 * x2 + rng.normal(scale=0.1, size=n)
          pd.DataFrame({"y": y, "a": a, "x1": x1, "x2": x2}).to_csv("/tmp/itbound-testpypi/quick_input.csv", index=False)
          PY
          itbound quick \
            --data /tmp/itbound-testpypi/quick_input.csv \
            --treatment a \
            --outcome y \
            --covariates x1,x2 \
            --outdir /tmp/itbound-testpypi/out
          test -f /tmp/itbound-testpypi/out/results.json

  publish-pypi:
    needs: install-smoke-testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
